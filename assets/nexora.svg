<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Silver gradient -->
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bfc3c7"></stop>
      <stop offset="30%" stop-color="#f5f7f8"></stop>
      <stop offset="60%" stop-color="#a6abb0"></stop>
      <stop offset="100%" stop-color="#e6e8ea"></stop>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="110" cy="110" r="100" fill="#0f0f14"></circle>

  <!-- Stylized N -->
  <path d="M70 150 V70 L150 150 V70" fill="none" stroke="url(#silverGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"></path>

  <!-- AI dot -->
  <circle cx="150" cy="70" r="6" fill="url(#silverGradient)"></circle>

  <!-- Text -->
  <text x="110" y="195" text-anchor="middle" font-size="22" font-weight="600" letter-spacing="2" fill="url(#silverGradient)" font-family="Segoe UI, Poppins, Arial">
    NEXORA AI
  </text>
</svg>
